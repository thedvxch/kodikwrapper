name: publish

# auto-release: push a `chore: v<version>` commit to master (after bumping the
# version in package.json) and this ships it. also runnable manually.
# publishing uses npm trusted publishing (oidc) — no NPM_TOKEN secret needed.
# configure the trusted publisher once on npmjs.com:
#   package settings -> publishing access -> trusted publisher
#   repo: thedvxch/kodikwrapper, workflow: publish.yml
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write # push the version tag + cut the github release
  id-token: write # npm provenance + oidc trusted publishing

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: build & publish to npm
    # only on a manual run or a `chore: v...` bump commit
    if: "${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore: v') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can diff from the previous tag

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: verify (lint + test + build)
        run: |
          pnpm lint
          pnpm exec vitest run
          pnpm build

      - name: read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # skip cleanly if this version is already on npm (re-runs / no bump = no-op)
      - name: check if already published
        id: check
        run: |
          if npm view "kodikwrapper@${{ steps.ver.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "kodikwrapper@${{ steps.ver.outputs.version }} already on npm — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # trusted publishing: npm mints a short-lived token from the oidc claim and
      # attaches provenance automatically. no secrets involved.
      - name: publish
        if: steps.check.outputs.exists == 'false'
        run: npm publish --provenance --access public

      - name: tag + github release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          v="v${{ steps.ver.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$v"
          git push origin "$v"
          node scripts/changelog.mjs > RELEASE_NOTES.md
          gh release create "$v" --title "$v" --notes-file RELEASE_NOTES.md
